<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐2-CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
    <div id="display"> </div>
    <div id="row1">
        <button class="operator">C</button>  
        <button class="operator">.</button>  
        <button class="operator">=</button>  
        <button class="operator">/</button>  
    </div>
    <div id="row2">
        <button>1</button>  
        <button>2</button>  
        <button>3</button>  
        <button class="operator">+</button>  
    </div>
    <div id="row3">
        <button>4</button>  
        <button>5</button>  
        <button>6</button>  
        <button class="operator">-</button>  
    </div>
    <div id="row4">
        <button>7</button>  
        <button>8</button>  
        <button>9</button>  
        <button class="operator" data-value="*">X</button>
    </div>
    <div id="row5">
        <button id="zero">0</button>  
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
